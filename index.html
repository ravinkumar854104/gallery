<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart AI Photo Gallery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap');
        body { font-family: 'Outfit', sans-serif; background-color: #f8fafc; }
        .glass { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.2); }
        .photo-card:hover .actions { opacity: 1; transform: translateY(0); }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .face-blob { transition: all 0.3s ease; }
        .face-blob:hover { transform: scale(1.1); z-index: 10; }
    </style>
</head>
<body class="min-h-screen text-slate-800">

    <!-- Navbar -->
    <nav class="sticky top-0 z-50 glass px-6 py-4 mb-6 shadow-sm">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center text-white">
                    <i class="fas fa-bolt"></i>
                </div>
                <h1 class="text-xl font-bold tracking-tight text-slate-900">SMART GALLERY</h1>
            </div>
            <div id="status" class="text-[10px] font-bold px-3 py-1 bg-slate-100 rounded-full text-slate-500 uppercase tracking-widest">
                Connecting...
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 pb-20">
        
        <!-- Smart Section: Face Albums (Google Photos Style) -->
        <section class="mb-12">
            <h3 class="text-sm font-bold text-slate-400 uppercase tracking-widest mb-6">Log aur Albums</h3>
            <div id="people-scroller" class="flex gap-6 overflow-x-auto pb-4 scrollbar-hide">
                <div class="flex-shrink-0 flex flex-col items-center gap-2 opacity-30">
                    <div class="w-20 h-20 rounded-full bg-slate-200 border-4 border-white shadow-md flex items-center justify-center">
                        <i class="fas fa-user-plus text-2xl"></i>
                    </div>
                    <span class="text-xs font-semibold">Tag Karein</span>
                </div>
            </div>
        </section>

        <!-- Main Controls -->
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-6 mb-10">
            <div>
                <h2 class="text-4xl font-extrabold text-slate-900 tracking-tight">Meri DSLR Gallery</h2>
                <p class="text-slate-500 mt-1">Automatic sync GitHub aur Vercel ke sath.</p>
            </div>
            <div class="flex gap-3">
                <label for="upload" class="cursor-pointer bg-indigo-600 hover:bg-indigo-700 text-white px-8 py-3.5 rounded-2xl font-bold shadow-xl shadow-indigo-200 transition-all flex items-center gap-3 active:scale-95">
                    <i class="fas fa-plus-circle text-lg"></i>
                    Upload New
                    <input type="file" id="upload" class="hidden" accept="image/*" multiple disabled>
                </label>
            </div>
        </div>

        <!-- Progress Loader -->
        <div id="loader" class="py-20 flex flex-col items-center justify-center gap-4">
            <div class="w-12 h-12 border-4 border-indigo-100 border-t-indigo-600 rounded-full animate-spin"></div>
            <p class="text-slate-400 font-medium italic">Photos sync ho rahi hain...</p>
        </div>

        <!-- Gallery Grid -->
        <div id="gallery-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-4"></div>

    </main>

    <!-- Tag Modal -->
    <div id="tag-modal" class="fixed inset-0 bg-slate-900/80 backdrop-blur-sm z-[100] hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-3xl p-8 w-full max-w-md shadow-2xl">
            <h4 class="text-2xl font-bold text-slate-900 mb-4">Kise Tag Karein?</h4>
            <input type="text" id="tag-name" class="w-full bg-slate-50 border-2 border-slate-100 rounded-2xl p-4 mb-6 outline-none font-semibold" placeholder="Naam likhein">
            <button id="save-tag" class="w-full bg-indigo-600 text-white font-bold py-4 rounded-2xl shadow-lg">Save Album</button>
            <button id="close-modal" class="w-full mt-2 text-slate-400 font-bold py-2">Cancel</button>
        </div>
    </div>

    <!-- Notification Notification -->
    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 glass px-8 py-4 rounded-3xl shadow-2xl z-[110] opacity-0 translate-y-10 transition-all duration-500 pointer-events-none">
        <span id="toast-text" class="font-bold text-slate-800">Done!</span>
    </div>

    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInAnonymously, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, deleteDoc, updateDoc, doc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Firebase Config (User's Credentials)
        const firebaseConfig = {
            apiKey: "AIzaSyBSmODqmS70zYYp6teqgaORzH8QAnhRS-k",
            authDomain: "mygallery-dbfc5.firebaseapp.com",
            projectId: "mygallery-dbfc5",
            storageBucket: "mygallery-dbfc5.firebasestorage.app",
            messagingSenderId: "141942025624",
            appId: "1:141942025624:web:3144e8210d3cea5daa0fed",
            measurementId: "G-EQ53K79RQJ"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = 'smart-gallery-prod';

        const galleryGrid = document.getElementById('gallery-grid');
        const uploadInput = document.getElementById('upload');
        const loader = document.getElementById('loader');
        const status = document.getElementById('status');
        const peopleScroller = document.getElementById('people-scroller');
        const tagModal = document.getElementById('tag-modal');
        const tagNameInput = document.getElementById('tag-name');
        
        let user = null;
        let photos = [];
        let selectedId = null;
        let filterTag = null;

        // Start Auth
        const init = async () => {
            try {
                await signInAnonymously(auth);
            } catch (err) {
                console.error("Auth error:", err);
            }
        };
        init();

        onAuthStateChanged(auth, (u) => {
            if (u) {
                user = u;
                status.innerText = "CLOUD SYNC: ACTIVE ✅";
                uploadInput.disabled = false;
                syncGallery();
            }
        });

        // Compression for DSLR Photos (Auto-Resize to fit Firestore 1MB limit)
        async function optimize(file) {
            return new Promise(res => {
                const r = new FileReader();
                r.readAsDataURL(file);
                r.onload = e => {
                    const img = new Image();
                    img.src = e.target.result;
                    img.onload = () => {
                        const can = document.createElement('canvas');
                        let w = img.width, h = img.height;
                        const MAX = 1200; 
                        if (w > h && w > MAX) { h *= MAX / w; w = MAX; }
                        else if (h > MAX) { w *= MAX / h; h = MAX; }
                        can.width = w; can.height = h;
                        can.getContext('2d').drawImage(img, 0, 0, w, h);
                        res(can.toDataURL('image/jpeg', 0.7)); 
                    };
                };
            });
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            document.getElementById('toast-text').innerText = msg;
            t.classList.remove('opacity-0', 'translate-y-10');
            t.classList.add('opacity-100', 'translate-y-0');
            setTimeout(() => {
                t.classList.add('opacity-0', 'translate-y-10');
                t.classList.remove('opacity-100', 'translate-y-0');
            }, 3000);
        }

        function syncGallery() {
            const ref = collection(db, 'artifacts', appId, 'users', user.uid, 'photos');
            onSnapshot(ref, (snap) => {
                loader.style.display = 'none';
                photos = [];
                snap.forEach(d => photos.push({ id: d.id, ...d.data() }));
                render();
            }, (err) => {
                console.error("Sync error:", err);
                status.innerText = "Error Syncing ❌";
            });
        }

        function render() {
            const groups = {};
            photos.forEach(p => { if(p.tag) groups[p.tag] = p.url; });
            
            peopleScroller.innerHTML = '';
            Object.keys(groups).forEach(name => {
                const div = document.createElement('div');
                div.className = `flex-shrink-0 flex flex-col items-center gap-2 cursor-pointer face-blob ${filterTag === name ? 'opacity-100' : 'opacity-60'}`;
                div.innerHTML = `
                    <div class="w-20 h-20 rounded-full overflow-hidden border-4 ${filterTag === name ? 'border-indigo-600' : 'border-white'} shadow-lg">
                        <img src="${groups[name]}" class="w-full h-full object-cover">
                    </div>
                    <span class="text-xs font-bold text-slate-700">${name}</span>
                `;
                div.onclick = () => { filterTag = (filterTag === name) ? null : name; render(); };
                peopleScroller.appendChild(div);
            });

            galleryGrid.innerHTML = '';
            const filtered = filterTag ? photos.filter(p => p.tag === filterTag) : photos;
            
            filtered.forEach(p => {
                const div = document.createElement('div');
                div.className = 'photo-card relative aspect-[3/4] bg-white rounded-3xl overflow-hidden shadow-sm hover:shadow-2xl transition-all group';
                div.innerHTML = `<img src="${p.url}" class="w-full h-full object-cover" loading="lazy">
                    <div class="actions opacity-0 translate-y-4 absolute inset-0 bg-gradient-to-t from-black/80 via-transparent to-transparent flex flex-col justify-end p-4 transition-all duration-300">
                        <div class="flex justify-between items-center">
                            <button class="tag-trigger bg-white/20 text-white px-4 py-2 rounded-full text-xs font-bold hover:bg-white hover:text-slate-900 transition-all">
                                <i class="fas fa-tag"></i> ${p.tag || 'Tag Karein'}
                            </button>
                            <button class="del-trigger w-9 h-9 bg-red-500/20 text-white rounded-full hover:bg-red-600 transition-all"><i class="fas fa-trash-alt"></i></button>
                        </div>
                    </div>`;
                div.querySelector('.tag-trigger').onclick = () => { selectedId = p.id; tagNameInput.value = p.tag || ''; tagModal.classList.remove('hidden'); };
                div.querySelector('.del-trigger').onclick = async () => { 
                    await deleteDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'photos', p.id));
                    showToast("Photo Hatai Gayi");
                };
                galleryGrid.appendChild(div);
            });
        }

        uploadInput.onchange = async (e) => {
            const files = Array.from(e.target.files);
            if(!files.length) return;
            showToast(`${files.length} Photos sync ho rahi hain...`);
            for(let f of files) {
                const url = await optimize(f);
                await addDoc(collection(db, 'artifacts', appId, 'users', user.uid, 'photos'), {
                    url, tag: null, time: Date.now()
                });
            }
            uploadInput.value = '';
        };

        document.getElementById('save-tag').onclick = async () => {
            const name = tagNameInput.value.trim();
            if(name && selectedId) {
                await updateDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'photos', selectedId), { tag: name });
                tagModal.classList.add('hidden');
                showToast(`${name} ke album mein add ho gaya!`);
            }
        };
        document.getElementById('close-modal').onclick = () => tagModal.classList.add('hidden');
    </script>
</body>
</html>
